name: run-agent

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm install
          npm install sharp

      - name: Set environment variables (safe write)
        run: |
          {
            echo "GEMINI_API_KEY<<EOF"
            echo "${{ secrets.GEMINI_API_KEY }}"
            echo "EOF"

            echo "OPENAI_API_KEY<<EOF"
            echo "${{ secrets.OPENAI_API_KEY }}"
            echo "EOF"

            echo "YOUTUBE_API_KEY<<EOF"
            echo "${{ secrets.YOUTUBE_API_KEY }}"
            echo "EOF"

            echo "YT_REFRESH_TOKEN<<EOF"
            echo "${{ secrets.YT_REFRESH_TOKEN }}"
            echo "EOF"

            echo "YT_CREDENTIALS_JSON<<EOF"
            echo "${{ secrets.YT_CREDENTIALS_JSON }}"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Run automation pipeline
        run: node index.js
